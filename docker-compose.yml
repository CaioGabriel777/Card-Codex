services:
  # Only Postgres runs in Docker for local dev. Running the Next.js dev server
  # natively (see README) avoids the CPU/IO overhead of bind-mounting the repo
  # into a container on Windows/macOS (chokidar polling + gRPC-fuse/WSL2 file
  # translation). For a containerized app image, see Dockerfile + the
  # `docker compose -f docker-compose.prod.yml` stack.
  db:
    image: postgres:16-alpine
    container_name: card-codex-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardcodex
      POSTGRES_PASSWORD: cardcodex123
      POSTGRES_DB: cardcodex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardcodex -d cardcodex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
